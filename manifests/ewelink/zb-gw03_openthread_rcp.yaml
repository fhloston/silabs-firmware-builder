name: ZB-GW03 OpenThread RCP
device: EFR32MG21A020F768IM32
base_project: src/openthread_rcp
filename: "{manifest_name}_{ot_rcp_version.split('/')[-1]}_gsdk_{sdk_version}"
sdk: "simplicity_sdk:2025.6.2"
toolchain: "12.2.1.20221205"

gbl:
  fw_type: openthread_rcp
  ot_rcp_version: dynamic
  baudrate: 230400

add_components:
- id: iostream_usart
  instance: [vcom]

c_defines:
  SL_IOSTREAM_USART_VCOM_PERIPHERAL: USART0
  SL_IOSTREAM_USART_VCOM_PERIPHERAL_NO: 0
  SL_IOSTREAM_USART_VCOM_BAUDRATE: 230400
  SL_IOSTREAM_USART_VCOM_TX_PORT: SL_GPIO_PORT_B
  SL_IOSTREAM_USART_VCOM_TX_PIN:  1
  SL_IOSTREAM_USART_VCOM_RX_PORT: SL_GPIO_PORT_B
  SL_IOSTREAM_USART_VCOM_RX_PIN:  0
  SL_IOSTREAM_USART_VCOM_CTS_PORT: SL_GPIO_PORT_D
  SL_IOSTREAM_USART_VCOM_CTS_PIN:  3
  SL_IOSTREAM_USART_VCOM_RTS_PORT: SL_GPIO_PORT_D
  SL_IOSTREAM_USART_VCOM_RTS_PIN:  4
  SL_IOSTREAM_USART_VCOM_RX_BUFFER_SIZE: 512
  SL_IOSTREAM_USART_VCOM_FLOW_CONTROL_TYPE: usartHwFlowControlNone
